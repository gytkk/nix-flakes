#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.6-sol"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.nixos]
command = "mcp-nixos"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[otel]
environment = "dev"
log_user_prompt = false
exporter = { otlp-http = { endpoint = "https://otlp.datadoghq.com/v1/logs", protocol = "binary", headers = { "dd-api-key" = "${DD_API_KEY}" } } }
metrics_exporter = { otlp-http = { endpoint = "https://otlp.datadoghq.com/v1/metrics", protocol = "binary", headers = { "dd-api-key" = "${DD_API_KEY}", "dd-otel-metric-config" = '{"resource_attributes_as_tags": true}' } } }
trace_exporter = "none"

[features]
default_mode_request_user_input = true
multi_agent = true

[tui]
alternate_screen = "never"
notification_method = "auto"
notifications = true
status_line = [
  "model-with-reasoning",
  "current-dir",
  "project-root",
  "git-branch",
  "context-used",
  "fast-mode",
]
theme = "one-half-dark"

[tui.keymap.editor]
insert_newline = ["ctrl-j", "shift-enter"]

[history]
persistence = "save-all"
