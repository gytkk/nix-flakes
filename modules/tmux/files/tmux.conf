set -g base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on
set -g history-limit 100000
set -g display-time 2000
set -g clock-mode-style 24
set -g set-titles on
set -g set-titles-string '#S'
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB,tmux-256color:RGB"
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features "xterm*:extkeys"
# Claude Code probes the outer terminal's keyboard protocol via passthrough;
# without this it cannot detect Shift+Enter inside tmux.
set -g allow-passthrough on
set -g set-clipboard on
setw -g pane-base-index 1

source-file -q ~/.config/tmux/keybindings.conf
source-file -q ~/.config/tmux/statusline.conf
