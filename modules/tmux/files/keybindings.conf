# Prefix.
set-option -g prefix C-a
set-option -g prefix2 None
unbind-key C-b
bind-key -N "Send prefix to nested tmux sessions" C-a send-prefix

# Discovery.
bind-key -N "Show tmux key bindings" ? display-popup -E -w 90% -h 90% "{ tmux list-keys -N; printf '\n-- all bindings --\n'; tmux list-keys; } | less -R"
bind-key -N "Reload tmux config" r source-file ~/.config/tmux/tmux.conf \; source-file -q ~/.config/tmux/keybindings.conf \; source-file -q ~/.config/tmux/statusline.conf \; display-message "tmux config reloaded"

# Extra pane controls.
bind-key -N "Split pane right in the current directory" v split-window -h -c "#{pane_current_path}"
bind-key -N "Split pane down in the current directory" - split-window -v -c "#{pane_current_path}"
bind-key -N "Toggle synchronized panes" S set-window-option synchronize-panes \; display-message "synchronize-panes toggled"

# Pane navigation.
bind-key -r -N "Select the pane to the left" h select-pane -L
bind-key -r -N "Select the pane below" j select-pane -D
bind-key -r -N "Select the pane above" k select-pane -U
bind-key -r -N "Select the pane to the right" l select-pane -R

# Copy mode.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
