# Statusline layout.
set -g status on
set -g status-position top
set -g status-interval 2
set -g status-left-length 90
set -g status-right-length 170
set -g status-justify left
set -g status-style 'fg=colour250,bg=colour234'

# State indicators.
set -g status-left '#{?client_prefix,#[fg=colour231]#[bg=colour160]#[bold] #S #[default],#[fg=colour234]#[bg=colour39]#[bold] #S #[default]}#{?pane_synchronized,#[fg=colour232]#[bg=colour220]#[bold] SYNC #[default],}'

# Basic reminders. Keep these on C-a because tmux.conf changes the prefix.
set -g status-right '#{?client_prefix,#[fg=colour250] ? help | w tree | s sessions | , rename | %/" split | z zoom | [ copy #[default],}'

# Window list.
set -g window-status-separator ''
setw -g window-status-format '#[fg=colour244,bg=colour234] #I #W#F #[default]'
setw -g window-status-current-format '#[fg=colour39,bg=colour234,bold] #I #[fg=colour250,bg=colour234,bold]#W#F #[default]'

# Generated theme override. The settings above stay as a fallback if the
# selected canonical theme export is unavailable.
source-file -q ~/.config/tmux/theme.conf
