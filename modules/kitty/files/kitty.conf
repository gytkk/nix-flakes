# Kitty config aligned with the current Ghostty defaults.
# The binary is installed separately; this module only manages ~/.config/kitty/kitty.conf.

# Keep kitty's native terminfo so its extended features continue to work.

font_family JetBrains Mono
font_size 12.0

# Hangul fallback
symbol_map U+1100-U+11FF,U+3130-U+318F,U+A960-U+A97F,U+AC00-U+D7A3,U+D7B0-U+D7FF Sarasa Mono CL

# One Half Light palette
foreground #383a42
background #fdfdfd
selection_foreground #383a42
selection_background #bfceff
cursor #3a9a88
cursor_text_color #ffffff
url_color #0184bc

color0 #383a42
color1 #e45649
color2 #50a14f
color3 #c18401
color4 #0184bc
color5 #d65d0e
color6 #427b58
color7 #fdfdfd
color8 #4f525e
color9 #e06c75
color10 #98c379
color11 #e5c07b
color12 #61afef
color13 #e78a4e
color14 #689d6a
color15 #ffffff

background_opacity 0.95

cursor_shape beam
cursor_beam_thickness 2.5

# Center the grid when the window size is not an exact cell multiple.
placement_strategy center
remember_window_size yes

# Keep split borders subtle instead of kitty's bright defaults.
draw_minimal_borders yes
active_border_color #d0d7de
inactive_border_color #e5e7eb
bell_border_color #e45649
inactive_text_alpha 0.85

strip_trailing_spaces smart
allow_hyperlinks yes
shell_integration enabled

macos_titlebar_color background
