# One Half Light theme (matching ghostty/Zed)
background #fdfdfd
foreground #383a42
selection_background #bfceff
selection_foreground #383a42
cursor #3a9a88
cursor_text_color #ffffff
cursor_shape beam
cursor_beam_thickness 2.5

# Terminal colors
color0 #383a42
color1 #e45649
color2 #50a14f
color3 #c18401
color4 #0184bc
color5 #d65d0e
color6 #427b58
color7 #fdfdfd
color8 #4f525e
color9 #e06c75
color10 #98c379
color11 #e5c07b
color12 #61afef
color13 #e78a4e
color14 #689d6a
color15 #ffffff

background_opacity 0.95

font_size 12
font_family JetBrains Mono

# CJK fallback (Hangul, CJK Unified Ideographs, Kana, Fullwidth Forms)
symbol_map U+1100-U+11FF,U+2E80-U+9FFF,U+AC00-U+D7AF,U+F900-U+FAFF,U+FE30-U+FE4F,U+FF00-U+FFEF,U+3040-U+30FF,U+31F0-U+31FF,U+3130-U+318F,U+20000-U+2FA1F Sarasa Mono CL

# Window
placement_strategy center

# URL handling
detect_urls yes
url_style curly

# Shell integration
shell_integration enabled
