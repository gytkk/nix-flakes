theme = "one-half-light"
confirm-before-quit = false
hide-mouse-cursor-when-typing = true
use-fork = false
use-kitty-keyboard-protocol = true
scrollback-history-limit = 90000
enable-scroll-bar = true
padding = [0]

[cursor]
shape = "beam"

[fonts]
size = 12
family = "JetBrainsMono Nerd Font Mono"
extras = [{ family = "NanumGothicCoding" }]
# Rio/macOS resolves built-in fallbacks before fonts.extras, so force Hangul
# ranges through the Korean mono font instead of relying on fallback order.
symbol-map = [
  { start = "1100", end = "1200", font-family = "NanumGothicCoding" },
  { start = "3130", end = "3190", font-family = "NanumGothicCoding" },
  { start = "A960", end = "A980", font-family = "NanumGothicCoding" },
  { start = "AC00", end = "D7A4", font-family = "NanumGothicCoding" },
  { start = "FFA0", end = "FFDD", font-family = "NanumGothicCoding" },
]
use-drawable-chars = false

[keyboard]
disable-ctlseqs-alt = false
ime-cursor-positioning = true

[navigation]
mode = "Tab"
use-split = true
hide-if-single = true
current-working-directory = true
unfocused-split-opacity = 0.85

[panel]
padding = [0]
row-gap = 0
column-gap = 0
border-width = 1.0
border-radius = 0.0

[window]
opacity = 0.95
decorations = "Enabled"

[platform]
macos.window.opacity = 0.98
macos.window.blur = true
macos.window.macos-use-shadow = true
macos.window.macos-use-unified-titlebar = true
