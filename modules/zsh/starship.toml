# Starship configuration
# Style: Tokyo Night layout with rounded edges
# Colors: One Half Light palette

"$schema" = 'https://starship.rs/config-schema.json'

palette = 'one_half_light'

format = """
[¯éÂ](iris)\
[ ¾░ëï ](bg:iris fg:base)\
[¯é┤](bg:foam fg:iris)\
$directory\
[¯é┤](fg:foam bg:overlay)\
$git_branch\
$git_status\
[¯é┤](fg:overlay bg:highlight_med)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é┤](fg:highlight_med bg:highlight_low)\
$docker_context\
$conda\
$pixi\
[¯é┤](fg:highlight_low)\
$fill\
[¯éÂ](fg:overlay)\
$kubernetes\
$hostname\
$time\
[¯é┤](fg:overlay)
$character"""

[fill]
symbol = " "

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "¾░çÜ "
"Music" = "¾░ØÜ "
"Pictures" = "¾░êƒ "
"Developer" = "¾░▓À "

[git_branch]
symbol = "¯éá"
style = "bg:overlay"
format = '[[ $symbol $branch ](fg:pine bg:overlay)]($style)'

[git_status]
style = "bg:overlay"
format = '[[($conflicted$staged$modified$untracked$renamed$deleted$stashed$ahead_behind )](fg:pine bg:overlay)]($style)'
conflicted = "=$count "
staged = "+$count "
modified = "!$count "
untracked = "?$count "
renamed = "┬╗$count "
deleted = "-$count "
stashed = "*$count "

[c]
symbol = "¯ÿ× "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[cpp]
symbol = "¯ÿØ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[nodejs]
symbol = "¯£ÿ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:pine bg:highlight_med)]($style)'

[rust]
symbol = "¾▒ÿù "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:rose bg:highlight_med)]($style)'

[golang]
symbol = "¯ÿª "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[php]
symbol = "¯£¢ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[java]
symbol = "¯£© "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:love bg:highlight_med)]($style)'

[kotlin]
symbol = "¯ÿ┤ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[haskell]
symbol = "¯ØÀ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[python]
symbol = "¯£╝ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:gold bg:highlight_med)]($style)'

[docker_context]
symbol = "´îê "
style = "bg:highlight_low"
format = '[[ $symbol($context) ](fg:foam bg:highlight_low)]($style)'

[conda]
symbol = "¯Ø╣ "
style = "bg:highlight_low"
format = '[[ $symbol($environment) ](fg:pine bg:highlight_low)]($style)'

[pixi]
symbol = "¾░Åù "
style = "bg:highlight_low"
format = '[[ $symbol($version) ($environment) ](fg:pine bg:highlight_low)]($style)'

[kubernetes]
disabled = false
symbol = "¾▒â¥ "
style = "bg:overlay"
format = '[[ $symbol$context ](fg:foam bg:overlay)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:overlay"
format = '[[ ¾░Ñö $time ](fg:muted bg:overlay)]($style)'

[hostname]
ssh_only = true
style = "bg:overlay"
format = '[[  $hostname ](fg:love bg:overlay)]($style)'

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:pine)'
error_symbol = '[ÔØ»](bold fg:love)'
vimcmd_symbol = '[ÔØ«](bold fg:pine)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:iris)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:iris)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:gold)'

# One Half Light palette
[palettes.one_half_light]
base = "#fafafa"
surface = "#f0f0f0"
overlay = "#d8d8d8"
muted = "#4f525e"
subtle = "#383a42"
text = "#383a42"
love = "#e45649"
gold = "#c18401"
rose = "#e06c75"
pine = "#0184bc"
foam = "#0997b3"
iris = "#a626a4"
highlight_low = "#f5f5f5"
highlight_med = "#e8e8e8"
highlight_high = "#d0d0d0"
green = "#50a14f"
