# Starship configuration
# Style: Tokyo Night layout
# Colors: Catppuccin Latte palette (light theme)

"$schema" = 'https://starship.rs/config-schema.json'

palette = 'catppuccin_latte'

format = """
[](lavender)\
[ ¾░ēŗ ](bg:lavender fg:base)\
[](bg:blue fg:lavender)\
$directory\
[](fg:blue bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1 bg:surface0)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:surface0 bg:mantle)\
$docker_context\
$conda\
$pixi\
[](fg:mantle)\
\n$character"""

right_format = """
[](fg:crust)\
$time\
[ ](bg:crust)"""

[directory]
style = "fg:base bg:blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "¾░ćÜ "
"Music" = "¾░ØÜ "
"Pictures" = "¾░ł¤ "
"Developer" = "¾░▓Ę "
"development" = "¾░▓Ę "

[git_branch]
symbol = "ŅéĀ"
style = "bg:surface1"
format = '[[ $symbol $branch ](fg:blue bg:surface1)]($style)'

[git_status]
style = "bg:surface1"
format = '[[($all_status$ahead_behind )](fg:blue bg:surface1)]($style)'

[c]
symbol = "Ņś× "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:sapphire bg:surface0)]($style)'

[cpp]
symbol = "ŅśØ "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:sapphire bg:surface0)]($style)'

[nodejs]
symbol = "Ņ£ś "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:green bg:surface0)]($style)'

[rust]
symbol = "¾▒śŚ "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:peach bg:surface0)]($style)'

[golang]
symbol = "Ņś” "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:sky bg:surface0)]($style)'

[php]
symbol = "Ņ£Į "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:mauve bg:surface0)]($style)'

[java]
symbol = "Ņ£Ė "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:red bg:surface0)]($style)'

[kotlin]
symbol = "Ņś┤ "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:mauve bg:surface0)]($style)'

[haskell]
symbol = "ŅØĘ "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:mauve bg:surface0)]($style)'

[python]
symbol = "Ņ£╝ "
style = "bg:surface0"
format = '[[ $symbol($version) ](fg:yellow bg:surface0)]($style)'

[docker_context]
symbol = "’īł "
style = "bg:mantle"
format = '[[ $symbol($context) ](fg:sky bg:mantle)]($style)'

[conda]
symbol = "ŅØ╣ "
style = "bg:mantle"
format = '[[ $symbol($environment) ](fg:green bg:mantle)]($style)'

[pixi]
symbol = "¾░ÅŚ "
style = "bg:mantle"
format = '[[ $symbol($version) ($environment) ](fg:green bg:mantle)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:crust"
format = '[[ ¾░źö $time ](fg:subtext0 bg:crust)]($style)'

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

