# Starship configuration
# Style: Tokyo Night layout with rounded edges
# Colors: One Half Light palette

"$schema" = 'https://starship.rs/config-schema.json'

palette = 'one_half_light'

format = """
[](iris_deep)\
[ 󰉋 ](bg:iris_deep fg:base)\
[](bg:foam fg:iris_deep)\
$directory\
[](fg:foam bg:overlay)\
$git_branch\
$git_status\
[](fg:overlay bg:highlight_med)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:highlight_med bg:highlight_low)\
$docker_context\
$conda\
$pixi\
[](fg:highlight_low)\
$fill\
[](fg:highlight_low)\
$kubernetes\
[](fg:surface bg:highlight_low)\
$hostname\
[](fg:highlight_med bg:surface)\
$time\
[](fg:highlight_med)
$character"""

[fill]
symbol = " "

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = "󰝚 "
"Pictures" = "󰈟 "
"Developer" = "󰲷 "

[git_branch]
symbol = ""
style = "bg:overlay"
format = '[[ $symbol $branch ](fg:pine bg:overlay)]($style)'

[git_status]
style = "bg:overlay"
format = '[[($conflicted$staged$modified$untracked$renamed$deleted$stashed$ahead_behind )](fg:pine bg:overlay)]($style)'
conflicted = "=$count "
staged = "+$count "
modified = "!$count "
untracked = "?$count "
renamed = "»$count "
deleted = "-$count "
stashed = "*$count "

[c]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[cpp]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[nodejs]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:pine bg:highlight_med)]($style)'

[rust]
symbol = "󱘗 "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:rose bg:highlight_med)]($style)'

[golang]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[php]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[java]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:love bg:highlight_med)]($style)'

[kotlin]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[haskell]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[python]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:gold bg:highlight_med)]($style)'

[docker_context]
symbol = " "
style = "bg:highlight_low"
format = '[[ $symbol($context) ](fg:foam bg:highlight_low)]($style)'

[conda]
symbol = " "
style = "bg:highlight_low"
format = '[[ $symbol($environment) ](fg:pine bg:highlight_low)]($style)'

[pixi]
symbol = "󰏗 "
style = "bg:highlight_low"
format = '[[ $symbol($version) ($environment) ](fg:pine bg:highlight_low)]($style)'

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bg:highlight_low"
format = '[[ $symbol$context ](fg:foam bg:highlight_low)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:highlight_med"
format = '[[ 󰥔 $time ](fg:muted bg:highlight_med)]($style)'

[hostname]
ssh_only = true
style = "bg:surface"
format = '[[  $hostname ](fg:love bg:surface)]($style)'

[character]
disabled = false
success_symbol = '[❯](bold fg:pine)'
error_symbol = '[❯](bold fg:love)'
vimcmd_symbol = '[❮](bold fg:pine)'
vimcmd_replace_one_symbol = '[❮](bold fg:iris)'
vimcmd_replace_symbol = '[❮](bold fg:iris)'
vimcmd_visual_symbol = '[❮](bold fg:gold)'

# One Half Light palette
[palettes.one_half_light]
base = "#fafafa"
surface = "#f0f0f0"
overlay = "#e5e5e5"
muted = "#4f525e"
subtle = "#383a42"
text = "#383a42"
love = "#e45649"
gold = "#c18401"
rose = "#e06c75"
pine = "#0184bc"
foam = "#0997b3"
iris = "#a626a4"
iris_deep = "#8f2291"
highlight_low = "#f5f5f5"
highlight_med = "#e8e8e8"
highlight_high = "#d0d0d0"
green = "#50a14f"
