# Starship configuration
# Style: Tokyo Night layout with rounded edges
# Colors: One Half Light palette
#
# Powerline layers (fill 기준, 안쪽 → 바깥쪽):
#   layer1 (#f5f5f5) → layer2 (#e8e8e8) → layer3 (#d8d8d8)
#   좌우 프롬프트 모두 동일한 layer alias 사용

"$schema" = 'https://starship.rs/config-schema.json'

palette = 'one_half_light'

format = """
[](iris)\
[ 󰉋 ](bg:iris fg:base)\
[](bg:foam fg:iris)\
$directory\
[](fg:foam bg:layer3)\
$git_branch\
$git_status\
[](fg:layer3 bg:layer2)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:layer2 bg:layer1)\
$docker_context\
$conda\
$pixi\
[](fg:layer1)\
$fill\
[](fg:layer1)\
$kubernetes\
[](fg:layer2 bg:layer1)\
$hostname\
[](fg:layer3 bg:layer2)\
$time\
[](fg:layer3)
$character"""

[fill]
symbol = " "

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = "󰝚 "
"Pictures" = "󰈟 "
"Developer" = "󰲷 "

[git_branch]
symbol = ""
style = "bg:layer3"
format = '[[ $symbol $branch ](fg:pine bg:layer3)]($style)'

[git_status]
style = "bg:layer3"
format = '[[($conflicted$staged$modified$untracked$renamed$deleted$stashed$ahead_behind )](fg:pine bg:layer3)]($style)'
conflicted = "=$count "
staged = "+$count "
modified = "!$count "
untracked = "?$count "
renamed = "»$count "
deleted = "-$count "
stashed = "*$count "

[c]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:foam bg:layer2)]($style)'

[cpp]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:foam bg:layer2)]($style)'

[nodejs]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:pine bg:layer2)]($style)'

[rust]
symbol = "󱘗 "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:rose bg:layer2)]($style)'

[golang]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:foam bg:layer2)]($style)'

[php]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:iris bg:layer2)]($style)'

[java]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:love bg:layer2)]($style)'

[kotlin]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:iris bg:layer2)]($style)'

[haskell]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:iris bg:layer2)]($style)'

[python]
symbol = " "
style = "bg:layer2"
format = '[[ $symbol($version) ](fg:gold bg:layer2)]($style)'

[docker_context]
symbol = " "
style = "bg:layer1"
format = '[[ $symbol($context) ](fg:foam bg:layer1)]($style)'

[conda]
symbol = " "
style = "bg:layer1"
format = '[[ $symbol($environment) ](fg:pine bg:layer1)]($style)'

[pixi]
symbol = "󰏗 "
style = "bg:layer1"
format = '[[ $symbol($version) ($environment) ](fg:pine bg:layer1)]($style)'

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bg:layer1"
format = '[[ $symbol$context ](fg:foam bg:layer1)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:layer3"
format = '[[ 󰥔 $time ](fg:muted bg:layer3)]($style)'

[hostname]
ssh_only = true
style = "bg:layer2"
format = '[[  $hostname ](fg:love bg:layer2)]($style)'

[character]
disabled = false
success_symbol = '[❯](bold fg:pine)'
error_symbol = '[❯](bold fg:love)'
vimcmd_symbol = '[❮](bold fg:pine)'
vimcmd_replace_one_symbol = '[❮](bold fg:iris)'
vimcmd_replace_symbol = '[❮](bold fg:iris)'
vimcmd_visual_symbol = '[❮](bold fg:gold)'

# One Half Light palette
[palettes.one_half_light]
base = "#fafafa"
surface = "#f0f0f0"
overlay = "#d8d8d8"
muted = "#4f525e"
subtle = "#383a42"
text = "#383a42"
love = "#e45649"
gold = "#c18401"
rose = "#e06c75"
pine = "#0184bc"
foam = "#0997b3"
iris = "#a626a4"
highlight_low = "#f5f5f5"
highlight_med = "#e8e8e8"
highlight_high = "#d0d0d0"
green = "#50a14f"
# Powerline layer aliases (안쪽 → 바깥쪽)
layer1 = "#f5f5f5"   # = highlight_low
layer2 = "#e8e8e8"   # = highlight_med
layer3 = "#d8d8d8"   # = overlay
