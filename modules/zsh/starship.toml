# Starship configuration
# Style: Tokyo Night layout with rounded edges
# Colors: One Half Light palette

"$schema" = 'https://starship.rs/config-schema.json'

palette = 'one_half_light'

format = """
[Óā∂](iris)\
[ ůįČč ](bg:iris fg:base)\
[Óāī](bg:foam fg:iris)\
$directory\
[Óāī](fg:foam bg:overlay)\
$git_branch\
$git_status\
[Óāī](fg:overlay bg:highlight_med)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Óāī](fg:highlight_med bg:highlight_low)\
$docker_context\
$conda\
$pixi\
[Óāī](fg:highlight_low)\
$fill\
[Óā∂](fg:highlight_low)\
$kubernetes\
$hostname\
[Óā∂](fg:surface bg:highlight_low)\
$time\
[Óāī](fg:surface)
$character"""

[fill]
symbol = " "

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ůįáö "
"Music" = "ůįĚö "
"Pictures" = "ůįąü "
"Developer" = "ůį≤∑ "

[git_branch]
symbol = "Óā†"
style = "bg:overlay"
format = '[[ $symbol $branch ](fg:pine bg:overlay)]($style)'

[git_status]
style = "bg:overlay"
format = '[[($conflicted$staged$modified$untracked$renamed$deleted$stashed$ahead_behind )](fg:pine bg:overlay)]($style)'
conflicted = "=$count "
staged = "+$count "
modified = "!$count "
untracked = "?$count "
renamed = "¬Ľ$count "
deleted = "-$count "
stashed = "*$count "

[c]
symbol = "Óėě "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[cpp]
symbol = "ÓėĚ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[nodejs]
symbol = "Óúė "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:pine bg:highlight_med)]($style)'

[rust]
symbol = "ůĪėó "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:rose bg:highlight_med)]($style)'

[golang]
symbol = "Óė¶ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[php]
symbol = "ÓúĹ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[java]
symbol = "Óúł "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:love bg:highlight_med)]($style)'

[kotlin]
symbol = "Óėī "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[haskell]
symbol = "ÓĚ∑ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[python]
symbol = "Óúľ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:gold bg:highlight_med)]($style)'

[docker_context]
symbol = "ÔĆą "
style = "bg:highlight_low"
format = '[[ $symbol($context) ](fg:foam bg:highlight_low)]($style)'

[conda]
symbol = "ÓĚĻ "
style = "bg:highlight_low"
format = '[[ $symbol($environment) ](fg:pine bg:highlight_low)]($style)'

[pixi]
symbol = "ůįŹó "
style = "bg:highlight_low"
format = '[[ $symbol($version) ($environment) ](fg:pine bg:highlight_low)]($style)'

[kubernetes]
disabled = false
symbol = "ůĪÉĺ "
style = "bg:highlight_low"
format = '[[ $symbol$context ](fg:foam bg:highlight_low)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:surface"
format = '[[ ůį•Ē $time ](fg:muted bg:surface)]($style)'

[hostname]
ssh_only = true
style = "bg:highlight_low"
format = '[[  $hostname ](fg:love bg:highlight_low)]($style)'

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:pine)'
error_symbol = '[‚ĚĮ](bold fg:love)'
vimcmd_symbol = '[‚Ěģ](bold fg:pine)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:iris)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:iris)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:gold)'

# One Half Light palette
[palettes.one_half_light]
base = "#fafafa"
surface = "#f0f0f0"
overlay = "#e5e5e5"
muted = "#4f525e"
subtle = "#383a42"
text = "#383a42"
love = "#e45649"
gold = "#c18401"
rose = "#e06c75"
pine = "#0184bc"
foam = "#0997b3"
iris = "#a626a4"
highlight_low = "#f5f5f5"
highlight_med = "#e8e8e8"
highlight_high = "#d0d0d0"
green = "#50a14f"
