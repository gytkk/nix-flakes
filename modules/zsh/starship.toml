# Starship configuration
# Style: Tokyo Night layout
# Colors: Ros├® Pine Dawn palette (light theme)

"$schema" = 'https://starship.rs/config-schema.json'

palette = 'rose_pine_dawn'

format = """
[](iris)\
[ ¾░ēŗ ](bg:iris fg:base)\
[](bg:foam fg:iris)\
$directory\
[](fg:foam bg:overlay)\
$git_branch\
$git_status\
[](fg:overlay bg:highlight_med)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:highlight_med bg:highlight_low)\
$docker_context\
$conda\
$pixi\
[](fg:highlight_low)\
\n$character"""

right_format = """
[](fg:surface)\
$time\
[](fg:surface)"""

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "¾░ćÜ "
"Music" = "¾░ØÜ "
"Pictures" = "¾░ł¤ "
"Developer" = "¾░▓Ę "
"development" = "¾░▓Ę "

[git_branch]
symbol = ""
style = "bg:overlay"
format = '[[ $symbol $branch ](fg:pine bg:overlay)]($style)'

[git_status]
style = "bg:overlay"
format = '[[($all_status$ahead_behind )](fg:pine bg:overlay)]($style)'

[c]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[cpp]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[nodejs]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:pine bg:highlight_med)]($style)'

[rust]
symbol = "¾▒śŚ "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:rose bg:highlight_med)]($style)'

[golang]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:foam bg:highlight_med)]($style)'

[php]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[java]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:love bg:highlight_med)]($style)'

[kotlin]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[haskell]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:iris bg:highlight_med)]($style)'

[python]
symbol = " "
style = "bg:highlight_med"
format = '[[ $symbol($version) ](fg:gold bg:highlight_med)]($style)'

[docker_context]
symbol = " "
style = "bg:highlight_low"
format = '[[ $symbol($context) ](fg:foam bg:highlight_low)]($style)'

[conda]
symbol = " "
style = "bg:highlight_low"
format = '[[ $symbol($environment) ](fg:pine bg:highlight_low)]($style)'

[pixi]
symbol = "¾░ÅŚ "
style = "bg:highlight_low"
format = '[[ $symbol($version) ($environment) ](fg:pine bg:highlight_low)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:surface"
format = '[[ ¾░źö $time ](fg:muted bg:surface)]($style)'

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:pine)'
error_symbol = '[ŌØ»](bold fg:love)'
vimcmd_symbol = '[ŌØ«](bold fg:pine)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:iris)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:iris)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:gold)'

# Ros├® Pine Dawn palette
[palettes.rose_pine_dawn]
base = "#faf4ed"
surface = "#fffaf3"
overlay = "#f2e9e1"
muted = "#9893a5"
subtle = "#797593"
text = "#575279"
love = "#b4637a"
gold = "#ea9d34"
rose = "#d7827e"
pine = "#286983"
foam = "#56949f"
iris = "#907aa9"
highlight_low = "#f4ede8"
highlight_med = "#dfdad9"
highlight_high = "#cecacd"
