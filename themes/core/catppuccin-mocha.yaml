version: 1

meta:
  id: catppuccin-mocha
  name: Catppuccin Mocha
  variant: dark
  family: catppuccin
  author: catppuccin, pylv
  description: >-
    Canonical Catppuccin Mocha theme definition for nix-flakes, based on the
    official Mocha palette and Catppuccin style-guide usage recommendations.

palette:
  # Base24-compatible base slots.
  # Derived from the official Catppuccin Mocha flavor palette.
  base00: "#1e1e2e"
  base01: "#181825"
  base02: "#313244"
  base03: "#45475a"
  base04: "#6c7086"
  base05: "#cdd6f4"
  base06: "#bac2de"
  base07: "#f5e0dc"

  base08: "#f38ba8"
  base09: "#fab387"
  base0A: "#f9e2af"
  base0B: "#a6e3a1"
  base0C: "#94e2d5"
  base0D: "#89b4fa"
  base0E: "#cba6f7"
  base0F: "#f5c2e7"

  base10: "#89dceb"
  base11: "#74c7ec"
  base12: "#b4befe"
  base13: "#eba0ac"
  base14: "#a6adc8"
  base15: "#9399b2"
  base16: "#7f849c"
  base17: "#585b70"

  bg: "{palette.base00}"
  bgElevated: "{palette.base01}"
  bgAlt: "{palette.base02}"
  border: "{palette.base04}"
  muted: "{palette.base16}"
  comment: "{palette.base15}"
  fgMuted: "{palette.base14}"
  fg: "{palette.base05}"
  fgBright: "{palette.base06}"
  fgMax: "{palette.base07}"

  red: "{palette.base08}"
  orange: "{palette.base09}"
  yellow: "{palette.base0A}"
  green: "{palette.base0B}"
  cyan: "{palette.base0C}"
  blue: "{palette.base0D}"
  magenta: "{palette.base0E}"
  pink: "{palette.base0F}"

  yellowBright: "{palette.base09}"
  greenBright: "{palette.base0B}"
  cyanBright: "{palette.base10}"
  blueBright: "{palette.base12}"
  magentaBright: "{palette.base0E}"

  selection: "{palette.base15}"
  lineNumber: "{palette.base16}"
  whitespace: "{palette.base04}"
  blackBright: "{palette.base17}"
  white: "{palette.base05}"

roles:
  ui:
    bg: "{palette.bg}"
    bgAlt: "{palette.bgAlt}"
    bgElevated: "{palette.bgElevated}"
    fg: "{palette.fg}"
    fgMuted: "{palette.fgMuted}"
    border: "{palette.border}"
    borderActive: "{palette.base12}"
    selection: "{palette.selection}"
    selectionInactive: "{palette.base03}"
    currentLine: "{palette.base02}"
    currentLineNumber: "{palette.base12}"
    cursor: "{palette.base07}"
    caretText: "#11111b"
    search: "{palette.cyan}"
    searchText: "{palette.fg}"
    match: "{palette.base03}"
    panelBg: "{palette.bgElevated}"
    sidebarBg: "{palette.bgElevated}"
    statuslineBg: "{palette.bgElevated}"
    statuslineFg: "{palette.fg}"

  syntax:
    text: "{palette.fg}"
    comment: "{palette.comment}"
    string: "{palette.green}"
    stringEscape: "{palette.pink}"
    number: "{palette.orange}"
    constant: "{palette.orange}"
    keyword: "{palette.magenta}"
    operator: "{palette.base10}"
    variable: "{palette.fg}"
    parameter: "{palette.base13}"
    property: "{palette.blue}"
    field: "{palette.blue}"
    function: "{palette.blue}"
    method: "{palette.blue}"
    type: "{palette.yellow}"
    class: "{palette.yellow}"
    interface: "{palette.yellow}"
    namespace: "{palette.blue}"
    builtin: "{palette.red}"
    tag: "{palette.red}"
    attribute: "{palette.yellow}"
    punctuation: "{palette.comment}"
    link: "{palette.blue}"

  diagnostics:
    error: "{palette.red}"
    warning: "{palette.yellow}"
    info: "{palette.cyan}"
    hint: "{palette.base11}"
    ok: "{palette.green}"

  vcs:
    added: "{palette.green}"
    modified: "{palette.blue}"
    removed: "{palette.red}"
    renamed: "{palette.base12}"
    conflict: "{palette.orange}"

  ansi:
    black: "{palette.base03}"
    red: "{palette.red}"
    green: "{palette.green}"
    yellow: "{palette.yellow}"
    blue: "{palette.blue}"
    magenta: "{palette.pink}"
    cyan: "{palette.cyan}"
    white: "{palette.base14}"
    brightBlack: "{palette.blackBright}"
    brightRed: "{palette.red}"
    brightGreen: "{palette.greenBright}"
    brightYellow: "{palette.yellowBright}"
    brightBlue: "{palette.blueBright}"
    brightMagenta: "{palette.magentaBright}"
    brightCyan: "{palette.cyanBright}"
    brightWhite: "{palette.base06}"
