version: 1

meta:
  id: ayu-mirage
  name: Ayu Mirage
  variant: dark
  family: ayu
  author: ayu-theme, pylv
  description: >-
    Canonical Ayu Mirage theme definition for nix-flakes, based on the official
    ayu color palette package and its published mirage variant values.

palette:
  # Base24-compatible base slots.
  # Derived from the official ayu mirage palette and mapped into the canonical schema.
  base00: "#242936"
  base01: "#1F2430"
  base02: "#282E3B"
  base03: "#171B24"
  base04: "#707A8C"
  base05: "#CCCAC2"
  base06: "#8A9199"
  base07: "#D9D7CE"

  base08: "#F28779"
  base09: "#F29E74"
  base0A: "#FFCC66"
  base0B: "#D5FF80"
  base0C: "#95E6CB"
  base0D: "#73D0FF"
  base0E: "#DFBFFF"
  base0F: "#FFAD66"

  base10: "#FFD173"
  base11: "#87D96C"
  base12: "#5CCFE6"
  base13: "#80BFFF"
  base14: "#B8CFE6"
  base15: "#409FFF"
  base16: "#8A9199"
  base17: "#637599"

  bg: "{palette.base00}"
  bgElevated: "{palette.base01}"
  bgAlt: "{palette.base02}"
  border: "{palette.base03}"
  muted: "{palette.base04}"
  comment: "{palette.base14}"
  fgMuted: "{palette.base06}"
  fgInactive: "{palette.base06}"
  fg: "{palette.base05}"
  fgBright: "{palette.base07}"
  fgMax: "#ffffff"

  red: "{palette.base08}"
  orange: "{palette.base09}"
  yellow: "{palette.base0A}"
  green: "{palette.base0B}"
  cyan: "{palette.base0C}"
  blue: "{palette.base0D}"
  magenta: "{palette.base0E}"
  pink: "{palette.base0F}"

  yellowBright: "{palette.base10}"
  greenBright: "{palette.base11}"
  cyanBright: "{palette.base12}"
  blueBright: "{palette.base13}"
  magentaBright: "{palette.base14}"

  selection: "{palette.base15}"
  lineNumber: "{palette.base16}"
  whitespace: "{palette.base17}"
  blackBright: "{palette.base04}"
  white: "{palette.base07}"

roles:
  ui:
    bg: "{palette.bg}"
    bgAlt: "{palette.bgAlt}"
    bgElevated: "{palette.bgElevated}"
    fg: "{palette.fg}"
    fgInactive: "{palette.fgInactive}"
    fgMuted: "{palette.fgMuted}"
    border: "{palette.border}"
    borderActive: "{palette.selection}"
    selection: "{palette.selection}"
    selectionInactive: "{palette.base17}"
    currentLine: "#1A1F29"
    currentLineNumber: "{palette.base16}"
    cursor: "{palette.yellow}"
    caretText: "{palette.base09}"
    search: "#736950"
    searchText: "{palette.fg}"
    match: "#736950"
    panelBg: "{palette.base02}"
    sidebarBg: "{palette.base01}"
    statuslineBg: "{palette.base01}"
    statuslineFg: "{palette.fg}"

  syntax:
    text: "{palette.fg}"
    comment: "{palette.comment}"
    string: "{palette.green}"
    stringEscape: "{palette.cyan}"
    number: "{palette.orange}"
    constant: "{palette.magenta}"
    keyword: "{palette.pink}"
    operator: "{palette.orange}"
    variable: "{palette.fg}"
    parameter: "{palette.magenta}"
    property: "{palette.red}"
    field: "{palette.red}"
    function: "{palette.yellowBright}"
    method: "{palette.yellowBright}"
    type: "{palette.blue}"
    class: "{palette.blue}"
    interface: "{palette.blue}"
    namespace: "{palette.blue}"
    builtin: "{palette.cyan}"
    tag: "{palette.cyanBright}"
    attribute: "{palette.yellowBright}"
    punctuation: "{palette.fg}"
    link: "{palette.blue}"

  diagnostics:
    error: "#ff6666"
    warning: "{palette.yellow}"
    info: "{palette.blueBright}"
    hint: "{palette.cyan}"
    ok: "{palette.greenBright}"

  vcs:
    added: "{palette.greenBright}"
    modified: "{palette.blueBright}"
    removed: "#F27983"
    renamed: "{palette.blue}"
    conflict: "{palette.yellow}"

  ansi:
    black: "{palette.bgElevated}"
    red: "{palette.red}"
    green: "{palette.greenBright}"
    yellow: "{palette.yellow}"
    blue: "{palette.blue}"
    magenta: "{palette.magenta}"
    cyan: "{palette.cyanBright}"
    white: "{palette.fg}"
    brightBlack: "{palette.blackBright}"
    brightRed: "{palette.pink}"
    brightGreen: "{palette.green}"
    brightYellow: "{palette.yellowBright}"
    brightBlue: "{palette.blueBright}"
    brightMagenta: "{palette.magentaBright}"
    brightCyan: "{palette.cyan}"
    brightWhite: "{palette.white}"
