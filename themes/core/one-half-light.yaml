version: 1

meta:
  id: one-half-light
  name: One Half Light
  variant: light
  family: one-half
  author: pylv
  description: >-
    Canonical One Half Light theme for nix-flakes, consolidated from the current
    Neovim, Zed, and VS Code theme definitions.

palette:
  # Base24-compatible base slots.
  # For this light variant, base00..base07 move from light surfaces toward darker text.
  base00: "#fdfdfd"
  base01: "#f5f5f5"
  base02: "#f0f0f0"
  base03: "#e5e5e5"
  base04: "#9d9d9f"
  base05: "#383a42"
  base06: "#4f525e"
  base07: "#383a42"

  base08: "#e45649"
  base09: "#d65d0e"
  base0A: "#c18401"
  base0B: "#50a14f"
  base0C: "#427b58"
  base0D: "#0184bc"
  base0E: "#a626a4"
  base0F: "#e06c75"

  base10: "#e5c07b"
  base11: "#98c379"
  base12: "#56b6c2"
  base13: "#61afef"
  base14: "#c678dd"
  base15: "#bfceff"
  base16: "#a0a1a7"
  base17: "#d0d0d0"

  # Friendly aliases used by roles.
  bg: "{palette.base00}"
  bgElevated: "{palette.base01}"
  bgAlt: "{palette.base02}"
  border: "{palette.base03}"
  muted: "{palette.base04}"
  comment: "{palette.base16}"
  fgMuted: "{palette.base04}"
  fgInactive: "#696c77"
  fg: "{palette.base05}"
  fgBright: "{palette.base05}"
  fgMax: "{palette.base05}"

  red: "{palette.base08}"
  orange: "{palette.base09}"
  yellow: "{palette.base0A}"
  green: "{palette.base0B}"
  cyan: "{palette.base0C}"
  blue: "{palette.base0D}"
  magenta: "{palette.base0E}"
  pink: "{palette.base0F}"

  yellowBright: "{palette.base10}"
  greenBright: "{palette.base11}"
  cyanBright: "{palette.base12}"
  blueBright: "{palette.base13}"
  magentaBright: "{palette.base14}"

  selection: "{palette.base15}"
  lineNumber: "{palette.base16}"
  whitespace: "{palette.base17}"
  blackBright: "{palette.base06}"
  white: "#ffffff"

roles:
  ui:
    bg: "{palette.bg}"
    bgAlt: "{palette.bgAlt}"
    bgElevated: "{palette.bgElevated}"
    fg: "{palette.fg}"
    fgInactive: "{palette.fgInactive}"
    fgMuted: "{palette.fgMuted}"
    border: "{palette.border}"
    borderActive: "{palette.blue}"
    selection: "{palette.selection}"
    selectionInactive: "{palette.base03}"
    currentLine: "{palette.bgAlt}"
    currentLineNumber: "{palette.fgBright}"
    cursor: "{palette.blue}"
    caretText: "{palette.bg}"
    search: "{palette.yellowBright}"
    searchText: "{palette.fg}"
    match: "{palette.selection}"
    panelBg: "{palette.bgElevated}"
    sidebarBg: "{palette.bgElevated}"
    statuslineBg: "{palette.bgElevated}"
    statuslineFg: "{palette.fg}"

  syntax:
    text: "{palette.fg}"
    comment: "{palette.comment}"
    string: "{palette.green}"
    stringEscape: "{palette.cyan}"
    number: "{palette.yellow}"
    constant: "{palette.yellow}"
    keyword: "{palette.orange}"
    operator: "{palette.fg}"
    variable: "{palette.fg}"
    parameter: "{palette.fg}"
    property: "{palette.red}"
    field: "{palette.red}"
    function: "{palette.blue}"
    method: "{palette.blue}"
    type: "{palette.yellow}"
    class: "{palette.yellow}"
    interface: "{palette.yellow}"
    namespace: "{palette.red}"
    builtin: "{palette.cyan}"
    tag: "{palette.red}"
    attribute: "{palette.yellow}"
    punctuation: "{palette.fg}"
    link: "{palette.blue}"

  diagnostics:
    error: "{palette.red}"
    warning: "{palette.yellow}"
    info: "{palette.blue}"
    hint: "{palette.cyan}"
    ok: "{palette.green}"

  vcs:
    added: "{palette.green}"
    modified: "{palette.yellow}"
    removed: "{palette.red}"
    renamed: "{palette.blue}"
    conflict: "{palette.orange}"

  ansi:
    black: "{palette.fg}"
    red: "{palette.red}"
    green: "{palette.green}"
    yellow: "{palette.yellow}"
    blue: "{palette.blue}"
    magenta: "{palette.magenta}"
    cyan: "{palette.cyan}"
    white: "{palette.bg}"
    brightBlack: "{palette.blackBright}"
    brightRed: "{palette.pink}"
    brightGreen: "{palette.greenBright}"
    brightYellow: "{palette.yellowBright}"
    brightBlue: "{palette.blueBright}"
    brightMagenta: "{palette.magentaBright}"
    brightCyan: "{palette.cyanBright}"
    brightWhite: "{palette.white}"
