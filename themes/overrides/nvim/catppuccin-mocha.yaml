version: 1

meta:
  app: nvim
  theme: catppuccin-mocha
  variant: dark

groups:
  Search:
    fg: "{roles.ui.fg}"
    bg: "{roles.ui.search}"
  CurSearch:
    fg: "{roles.ui.fg}"
    bg: "{roles.diagnostics.error}"
  IncSearch:
    fg: "{roles.ui.fg}"
    bg: "{roles.diagnostics.error}"
  Substitute:
    fg: "{roles.ui.fg}"
    bg: "{roles.diagnostics.error}"
  Macro:
    fg: "{roles.ui.cursor}"
  @constant.macro:
    fg: "{roles.ui.cursor}"
  @function.macro:
    fg: "{roles.ui.cursor}"
  DiagnosticInfo:
    fg: "{roles.diagnostics.info}"
  DiagnosticHint:
    fg: "{roles.diagnostics.hint}"
  DiagnosticVirtualTextInfo:
    fg: "{roles.diagnostics.info}"
  DiagnosticVirtualTextHint:
    fg: "{roles.diagnostics.hint}"
  DiagnosticVirtualLinesInfo:
    fg: "{roles.diagnostics.info}"
  DiagnosticVirtualLinesHint:
    fg: "{roles.diagnostics.hint}"
  DiagnosticUnderlineInfo:
    sp: "{roles.diagnostics.info}"
  DiagnosticUnderlineHint:
    sp: "{roles.diagnostics.hint}"
  DiagnosticFloatingInfo:
    fg: "{roles.diagnostics.info}"
  DiagnosticFloatingHint:
    fg: "{roles.diagnostics.hint}"
  DiagnosticSignInfo:
    fg: "{roles.diagnostics.info}"
  DiagnosticSignHint:
    fg: "{roles.diagnostics.hint}"

links:
