version: 1

meta:
  app: nvim
  theme: rose-pine-moon
  variant: dark

groups:
  Search:
    fg: "{palette.fg}"
    bg: "{palette.orange}"
  CurSearch:
    fg: "{roles.ui.bg}"
    bg: "{palette.orange}"
  IncSearch:
    link: "CurSearch"
  Visual:
    bg: "{palette.blue}"
  MatchParen:
    fg: "{palette.green}"
    bg: "{palette.green}"
    underline: false
  PmenuSel:
    fg: "{palette.fg}"
    bg: "{roles.ui.bgAlt}"
  FloatTitle:
    fg: "{palette.cyan}"
    bold: true
  MoreMsg:
    fg: "{palette.blue}"
  Boolean:
    fg: "{palette.yellow}"
  Constant:
    fg: "{palette.orange}"
  Number:
    fg: "{palette.orange}"
  Float:
    fg: "{palette.orange}"
  Function:
    fg: "{palette.yellow}"
  Identifier:
    fg: "{palette.fg}"
  Keyword:
    fg: "{palette.green}"
  Conditional:
    fg: "{palette.green}"
  Repeat:
    fg: "{palette.green}"
  Exception:
    fg: "{palette.green}"
  Include:
    fg: "{palette.blue}"
  Define:
    fg: "{palette.blue}"
  Macro:
    fg: "{palette.blue}"
  PreCondit:
    fg: "{palette.blue}"
  PreProc:
    fg: "{palette.blue}"
  Label:
    fg: "{palette.cyan}"
  Special:
    fg: "{palette.cyan}"
  SpecialChar:
    link: "Special"
  SpecialComment:
    fg: "{palette.blue}"
  Statement:
    fg: "{palette.green}"
    bold: true
  StorageClass:
    fg: "{palette.cyan}"
  Structure:
    fg: "{palette.cyan}"
  Tag:
    fg: "{palette.cyan}"
  Todo:
    fg: "{palette.yellow}"
    bg: "{palette.yellow}"
  Type:
    fg: "{palette.cyan}"
  Typedef:
    link: "Type"
  @string.escape:
    fg: "{palette.yellow}"
  @boolean:
    fg: "{palette.yellow}"
  @number:
    fg: "{palette.orange}"
  @number.float:
    fg: "{palette.orange}"
  @constant:
    fg: "{palette.orange}"
  @function:
    fg: "{palette.yellow}"
  @function.call:
    fg: "{palette.yellow}"
  @function.method:
    fg: "{palette.yellow}"
  @function.method.call:
    fg: "{palette.yellow}"
  @keyword:
    fg: "{palette.green}"
  @keyword.coroutine:
    fg: "{palette.green}"
  @keyword.function:
    fg: "{palette.green}"
  @keyword.operator:
    fg: "{palette.green}"
  @keyword.import:
    fg: "{palette.green}"
  @keyword.type:
    fg: "{palette.green}"
  @keyword.modifier:
    fg: "{palette.green}"
  @keyword.repeat:
    fg: "{palette.green}"
  @keyword.return:
    fg: "{palette.green}"
  @keyword.debug:
    fg: "{palette.green}"
  @keyword.exception:
    fg: "{palette.green}"
  @keyword.conditional:
    fg: "{palette.green}"
  @keyword.conditional.ternary:
    fg: "{palette.green}"
  @keyword.directive:
    fg: "{palette.blue}"
  @keyword.directive.define:
    fg: "{palette.blue}"
  @type:
    fg: "{palette.cyan}"
  @type.definition:
    fg: "{palette.cyan}"
  @attribute:
    fg: "{palette.blue}"
  @function.builtin:
    fg: "{palette.blue}"
  @function.macro:
    fg: "{palette.blue}"
  @type.builtin:
    fg: "{palette.blue}"
  @attribute.builtin:
    fg: "{palette.blue}"
  @module.builtin:
    fg: "{palette.blue}"
  @variable.builtin:
    fg: "{palette.blue}"
  @constant.builtin:
    fg: "{palette.blue}"
  @constant.macro:
    fg: "{palette.blue}"
  @tag:
    fg: "{palette.cyan}"
  @lsp.type.class:
    fg: "{palette.cyan}"
  @lsp.type.struct:
    fg: "{palette.cyan}"
  @lsp.type.enum:
    fg: "{palette.cyan}"
  @lsp.type.enumMember:
    fg: "{palette.orange}"
  @lsp.type.interface:
    fg: "{palette.cyan}"
  @lsp.type.keyword:
    fg: "{palette.green}"
  @lsp.type.function:
    fg: "{palette.yellow}"
  @lsp.type.method:
    fg: "{palette.yellow}"
  @lsp.type.macro:
    fg: "{palette.blue}"
  @lsp.type.decorator:
    fg: "{palette.blue}"

links:
  @constructor: "@type"
