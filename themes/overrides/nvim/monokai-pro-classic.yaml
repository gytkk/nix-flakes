    fg: "{roles.syntax.text}"
  SnacksPickerMatch:
    fg: "{palette.cyan}"
    bold: true
  SnacksPickerPrompt:
    fg: "{palette.orange}"
  SnacksIndent:
    fg: "{roles.ui.border}"
  SnacksIndentScope:
    fg: "{palette.magenta}"
  IblIndent:
    fg: "{roles.ui.border}"
  IblScope:
    fg: "{palette.magenta}"

links:
  @constructor: "@type"
