    fg: "{palette.orange}"
  WhichKeyGroup:
    fg: "{palette.cyan}"
  WhichKeyDesc:
    fg: "{roles.syntax.text}"
  WhichKeySeparator:
    fg: "{roles.syntax.comment}"
  WhichKeyFloat:
    bg: "{roles.ui.bgAlt}"
  BlinkCmpMenu:
    bg: "{roles.ui.bgAlt}"
  BlinkCmpMenuBorder:
    fg: "{roles.syntax.comment}"
    bg: "{roles.ui.bgAlt}"
  BlinkCmpMenuSelection:
    fg: "{roles.ui.bg}"
    bg: "{palette.yellow}"
  BlinkCmpLabelMatch:
    fg: "{palette.cyan}"
