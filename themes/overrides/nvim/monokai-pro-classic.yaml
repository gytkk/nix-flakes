  FloatTitle:
    fg: "{palette.red}"
    bg: "{roles.ui.bgAlt}"
    bold: true
  FloatFooter:
    bg: "{roles.ui.bgAlt}"
  StatusLine:
    bg: "{roles.ui.bgAlt}"
  StatusLineNC:
    bg: "{roles.ui.bgAlt}"
  StatusLineTerm:
    bg: "{roles.ui.bgAlt}"
  TabLine:
    bg: "{roles.ui.bgAlt}"
  TabLineFill:
    bg: "{roles.ui.bgAlt}"
  Folded:
    bg: "{roles.ui.bgAlt}"
  Search:
    fg: "{roles.ui.bg}"
    bg: "{palette.yellow}"
  CurSearch:
    fg: "{roles.ui.bg}"
    bg: "{palette.orange}"
    bold: true
  IncSearch:
    fg: "{roles.ui.bg}"
    bg: "{palette.orange}"
  Visual:
    bg: "{roles.ui.bgAlt}"
