    sp: "{palette.magenta}"
  DiagnosticVirtualTextWarn:
    fg: "{palette.orange}"
  DiagnosticVirtualTextInfo:
    fg: "{palette.cyan}"
  DiagnosticVirtualTextHint:
    fg: "{palette.magenta}"
  DiagnosticVirtualLinesWarn:
    fg: "{palette.orange}"
  DiagnosticVirtualLinesInfo:
    fg: "{palette.cyan}"
