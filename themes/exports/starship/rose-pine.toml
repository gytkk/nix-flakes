# Auto-generated from themes/core/rose-pine.yaml
# Template: starship-theme-template v1
"$schema" = "https://starship.rs/config-schema.json"

palette = "rose_pine"
format = """
[](iris)\
[ 󰉋 ](bg:iris fg:base)\
[](bg:foam fg:iris)\
$directory\
[](fg:foam bg:layer3)\
$git_branch\
$git_status\
[](fg:layer3 bg:layer2)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:layer2 bg:layer1)\
$docker_context\
$conda\
$pixi\
[](fg:layer1)\
$fill\
[](fg:layer1)\
$kubernetes\
[](fg:layer2 bg:layer1)\
$hostname\
[](fg:layer3 bg:layer2)\
$time\
[](fg:layer3)
$character"""

[fill]
"symbol" = " "

[directory]
"style" = "fg:base bg:foam"
"format" = "[ $path ]($style)"
"truncation_length" = 4
"truncation_symbol" = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = "󰝚 "
"Pictures" = "󰈟 "
"Developer" = "󰲷 "

[git_branch]
"symbol" = ""
"style" = "bg:layer3"
"format" = "[[ $symbol $branch ](fg:pine bg:layer3)]($style)"

[git_status]
"style" = "bg:layer3"
"format" = "[[($conflicted$staged$modified$untracked$renamed$deleted$stashed$ahead_behind )](fg:pine bg:layer3)]($style)"
"conflicted" = "=$count "
"staged" = "+$count "
"modified" = "!$count "
"untracked" = "?$count "
"renamed" = "»$count "
"deleted" = "-$count "
"stashed" = "*$count "
"ahead" = "↑$count"
"behind" = "↓$count"
"diverged" = "↑$ahead_count↓$behind_count"

[c]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:foam bg:layer2)]($style)"

[cpp]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:foam bg:layer2)]($style)"

[nodejs]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:pine bg:layer2)]($style)"

[rust]
"symbol" = "󱘗 "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:rose bg:layer2)]($style)"

[golang]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:foam bg:layer2)]($style)"

[php]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:iris bg:layer2)]($style)"

[java]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:love bg:layer2)]($style)"

[kotlin]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:iris bg:layer2)]($style)"

[haskell]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:iris bg:layer2)]($style)"

[python]
"symbol" = " "
"style" = "bg:layer2"
"format" = "[[ $symbol($version) ](fg:gold bg:layer2)]($style)"

[docker_context]
"symbol" = " "
"style" = "bg:layer1"
"format" = "[[ $symbol($context) ](fg:foam bg:layer1)]($style)"

[conda]
"symbol" = " "
"style" = "bg:layer1"
"format" = "[[ $symbol($environment) ](fg:pine bg:layer1)]($style)"

[pixi]
"symbol" = "󰏗 "
"style" = "bg:layer1"
"format" = "[[ $symbol($version) ($environment) ](fg:pine bg:layer1)]($style)"

[kubernetes]
"disabled" = false
"symbol" = "󱃾 "
"style" = "bg:layer1"
"format" = "[[ $symbol$context ](fg:foam bg:layer1)]($style)"

[time]
"disabled" = false
"time_format" = "%R"
"style" = "bg:layer3"
"format" = "[[ 󰥔 $time ](fg:muted bg:layer3)]($style)"

[hostname]
"ssh_only" = true
"style" = "bg:layer2"
"format" = "[[ $hostname ](fg:love bg:layer2)]($style)"

[character]
"disabled" = false
"success_symbol" = "[❯](bold fg:pine)"
"error_symbol" = "[❯](bold fg:love)"
"vimcmd_symbol" = "[❮](bold fg:pine)"
"vimcmd_replace_one_symbol" = "[❮](bold fg:iris)"
"vimcmd_replace_symbol" = "[❮](bold fg:iris)"
"vimcmd_visual_symbol" = "[❮](bold fg:gold)"

[palettes.rose_pine]
base = "#191724"
surface = "#26233a"
overlay = "#524f67"
muted = "#908caa"
subtle = "#e0def4"
text = "#e0def4"
love = "#eb6f92"
gold = "#f6c177"
rose = "#eb6f92"
pine = "#f6c177"
foam = "#9ccfd8"
iris = "#eb6f92"
highlight_low = "#1f1d2e"
highlight_med = "#35324a"
highlight_high = "#524f67"
green = "#31748f"
layer1 = "#1f1d2e"
layer2 = "#35324a"
layer3 = "#524f67"
